name: Build and Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Deploy the built site straight from Actions (Settings → Pages → Source:
# "GitHub Actions"). No special branch — the build artifact is served directly.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        # 22+ for `node --experimental-strip-types` (the test runner).
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install, Lint, Test and Build
        run: |
          npm ci
          npm run lint
          npm test
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist # Vite build output (served under /dwi2trx/; no CNAME).

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
